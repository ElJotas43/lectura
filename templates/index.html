<!DOCTYPE html>
<html>

<head>
 <meta http-equiv="refresh" content="2"></meta>
<style>
	#tabla{border-collapse:collapse;
		}
	#q1,#q2,#q3,#q4{	
		width:100px;
		height:100px;
		border:1px solid black;
		text-align:center;
		}
	#q1{background-color:	
		{% if ejeX > 0 and ejeY > 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
	#q2{background-color:	
		{% if ejeX > 0 and ejeY < 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
	#q3{background-color:	
		{% if ejeX < 0 and ejeY > 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
	#q4{background-color:	
		{% if ejeX < 0 and ejeY < 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
</style>

</head>
<body>
<h2>Nombre: JuanPablo Pinto</h2>

<p>
Esta aplicación recibe datos X e Y desde una APK y muestra
la posición detectada mediante cuadrantes.
</p>

<a href="/vista2">Vista Radar</a>
<a href="/vista3">Vista Mapa</a>
<h1>Posición de XY</h1>

<p>X = {{ ejeX }}</p>
<p>Y = {{ ejeY }}</p>

<table id="tabla">
<tr id="cuadros">
    <td id="q1">Q1</td>
    <td id="q2">Q2</td>
</tr>
<tr>
    <td id="q3">Q3</td>
    <td id="q4">Q4</td>
</tr>
</table>

</body>
</html>
