<!DOCTYPE html>
<html>

<head>

<meta http-equiv="refresh" content="2">

<style>

#barra{
width:300px;
height:50px;
border:1px solid black;
background:lightblue;
text-align:center;
line-height:50px;
}

</style>

</head>

<body>

<h1>Mapa de Posición</h1>

<a href="/">Inicio</a>
<a href="/vista2">Radar</a>

<br><br>

<p>X = {{ejeX}}</p>
<p>Y = {{ejeY}}</p>

{% if ejeX > 0 and ejeY > 0 %}
<div id="barra">Noreste</div>

{% elif ejeX > 0 and ejeY < 0 %}
<div id="barra">Sureste</div>

{% elif ejeX < 0 and ejeY > 0 %}
<div id="barra">Noroeste</div>

{% else %}
<div id="barra">Suroeste</div>

{% endif %}

</body>

</html>
